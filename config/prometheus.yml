# Prometheus Configuration for AI Agent Sustainability Project
# Verified: 2026-06-14
#
# Local (docker-compose): uses service names for DNS resolution
# NAS deployment: uses host gateway IP for host-network containers
#
# Data flow: App(OTel SDK) → OTLP → OTel Collector(:4317/:4318) → Prometheus scrapes(:8889)

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # ── OTel Collector: Metrics Pipeline (primary source) ──
  # Receives OTLP from app services, exposes as Prometheus metrics
  - job_name: 'otel-collector'
    static_configs:
      # docker-compose: 'otel-collector:8889'
      # NAS standalone: '<host-gateway>:8889' (host network mode)
      - targets: ['otel-collector:8889']
    scrape_interval: 10s
    metrics_path: /metrics

  # ── OTel Collector: Internal Telemetry ──
  # NOTE: port 8881 (NOT 8888 - occupied by another service on host)
  - job_name: 'otel-collector-telemetry'
    static_configs:
      # docker-compose: 'otel-collector:8881'
      # NAS standalone: '<host-gateway>:8881'
      - targets: ['otel-collector:8881']
    scrape_interval: 30s
    metrics_path: /metrics

  # ── Application metrics (direct scrape fallback) ──
  - job_name: 'plugin-system'
    static_configs:
      - targets: ['plugin-system:8080']
    metrics_path: '/api/v1/metrics'
    scrape_interval: 10s

  # ── Infrastructure exporters ──
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093
