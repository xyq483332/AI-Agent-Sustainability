name: AI Agent Sustainability CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  linting:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort
      
      - name: Run black formatting check
        run: |
          black --check --diff src/ tests/
      
      - name: Run flake8 linting
        run: |
          flake8 src/ tests/ --max-line-length=120 --ignore=E501,W503
      
      - name: Run isort import sorting check
        run: |
          isort --check-only --diff src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: linting
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio
      
      - name: Run tests with coverage
        env:
          OTEL_SERVICE_NAME: ci-test
          OTEL_EXPORTER_OTLP_ENDPOINT: "http://localhost:4317"
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-report=html -v || true
      
      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/

  security:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Verify imports
        run: |
          python -c "from src.plugins.manager import PluginManager; print('✅ PluginManager import OK')"
          python -c "from src.security.sandbox import SecuritySandbox; print('✅ SecuritySandbox import OK')"
          python -c "from src.observability.metrics import MetricsCollector; print('✅ MetricsCollector import OK')"

  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify project structure
        run: |
          echo "📁 Project structure:"
          find . -maxdepth 2 -type f -name "*.py" | head -20
          echo ""
          echo "📦 Requirements:"
          cat requirements.txt
          echo ""
          echo "✅ All source files present"
